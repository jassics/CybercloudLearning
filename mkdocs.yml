site_name: CyberCloud Guru
site_url: https://cybercloud.guru/
site_description: Easy to follow and understand tutorials with real-world examples for Application Security, CloudSecurity, DevSecOps, AI security and many more.
site_author: Sanjeev Jaiswal (Jassi)
copyright: '&copy; Copyright 2026 - Developed with Care by CyberCloud Gurus'

theme:
  name: material #mkdocs, readthedocs, material
  nav_style: dark
  logo: "assets/images/logo.png"
  favicon: "assets/images/favicon.png"
  analytics:
    gtag: G-6SNSTEDE6T
  features:
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.tooltips
  icon:
    repo: fontawesome/brands/github
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: light blue
      accent: blue grey
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: light blue
      accent: light blue
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode

plugins:
  - search
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
          remove_comments: true

